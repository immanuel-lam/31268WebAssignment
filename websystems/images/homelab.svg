<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" width="640" height="340" role="img" aria-label="Home lab network diagram">
  <title>Immanuel's Home Lab Network Diagram</title>
  <rect width="640" height="340" fill="#f0f4f4" rx="8"/>

  <!-- Title -->
  <text x="320" y="30" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">Home Lab Network Overview</text>

  <!-- Internet -->
  <rect x="270" y="50" width="100" height="36" rx="6" fill="#2a7a7a"/>
  <text x="320" y="73" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff">Internet</text>

  <!-- Router / UDM -->
  <rect x="255" y="120" width="130" height="36" rx="6" fill="#1a1a1a"/>
  <text x="320" y="143" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff">Ubiquiti UDM</text>

  <!-- Lines from Internet to Router -->
  <line x1="320" y1="86" x2="320" y2="120" stroke="#2a7a7a" stroke-width="2"/>

  <!-- Managed Switch -->
  <rect x="255" y="192" width="130" height="36" rx="6" fill="#444"/>
  <text x="320" y="215" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff">Managed Switch</text>

  <!-- Line Router to Switch -->
  <line x1="320" y1="156" x2="320" y2="192" stroke="#2a7a7a" stroke-width="2"/>

  <!-- VLAN blocks -->
  <!-- Trusted -->
  <rect x="50" y="262" width="110" height="52" rx="6" fill="#2a7a7a"/>
  <text x="105" y="283" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">Trusted VLAN</text>
  <text x="105" y="300" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#cef0f0">Servers, PCs</text>

  <!-- IoT -->
  <rect x="185" y="262" width="110" height="52" rx="6" fill="#555"/>
  <text x="240" y="283" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">IoT VLAN</text>
  <text x="240" y="300" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ddd">Smart devices</text>

  <!-- Guest -->
  <rect x="320" y="262" width="110" height="52" rx="6" fill="#666"/>
  <text x="375" y="283" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">Guest VLAN</text>
  <text x="375" y="300" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ddd">Isolated WiFi</text>

  <!-- Mgmt -->
  <rect x="455" y="262" width="130" height="52" rx="6" fill="#2a7a7a" fill-opacity="0.7"/>
  <text x="520" y="283" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">Mgmt VLAN</text>
  <text x="520" y="300" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#cef0f0">Switches, APs</text>

  <!-- Lines Switch to VLANs -->
  <line x1="320" y1="228" x2="105" y2="262" stroke="#888" stroke-width="1.5"/>
  <line x1="320" y1="228" x2="240" y2="262" stroke="#888" stroke-width="1.5"/>
  <line x1="320" y1="228" x2="375" y2="262" stroke="#888" stroke-width="1.5"/>
  <line x1="320" y1="228" x2="520" y2="262" stroke="#888" stroke-width="1.5"/>

  <!-- Legend note -->
  <text x="320" y="330" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#777">Diagram by Immanuel Lam</text>
</svg>
